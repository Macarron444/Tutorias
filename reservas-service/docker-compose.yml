version: '3.8'

services:
  reservas-db:
    image: postgres:15-alpine
    container_name: reservas-db
    environment:
      POSTGRES_DB: tutorias_reservas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - reservas_data:/var/lib/postgresql/data
    networks:
      - tutorias-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  reservas-service:
    build: .
    container_name: reservas-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://reservas-db:5432/tutorias_reservas
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      reservas-db:
        condition: service_healthy
    networks:
      - tutorias-network
    restart: on-failure

networks:
  tutorias-network:
    external: true
    name: tutorias-network

volumes:
  reservas_data: