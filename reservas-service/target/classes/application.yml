server:
  port: 8082

spring:
  application:
    name: reservas-service

  datasource:
    url: jdbc:postgresql://postgres:5432/tutorias_reservas
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Eureka solo para registrar reservas, no para descubrir los otros
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    fetch-registry: false   # ← No busca otros servicios en Eureka
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# URLs directas de los otros servicios
servicios:
  usuarios-url: http://usuarios-service:8000
  catalogo-url: http://catalogo-service:3000

logging:
  level:
    com.tutorias: DEBUG